name: Python Unit Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true' # Clears the Node 20 warning

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest click numpy

    - name: Run Pytest with Debugging
      run: |
        echo "--- Directory Structure ---"
        ls -R
        echo "--- Test Collection ---"
        pytest --collect-only
        echo "--- Running Tests ---"
        pytest
